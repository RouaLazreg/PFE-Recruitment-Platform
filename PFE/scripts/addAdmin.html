<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Admin</title>
  </head>
  <body>
    <form onsubmit="return false">
      <div>
        <label for="username">Username</label>
        <input id="username" type="text" />
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" />
      </div>
      <div>
        <button onclick="add();" type="submit">Add Admin</button>
      </div>
    </form>
    <!-- Get Admins in Select Tag -->
    <script>
      var request = new XMLHttpRequest();

      // Open a new connection, using the GET request on the URL endpoint
      request.open("GET", "http://127.0.0.1:3000/admins", true);

      request.onload = function () {
        // Begin accessing JSON data here

        var data = JSON.parse(this.response);

        var x = document.getElementById("admins");

        data.forEach((i) => {
          var c = document.createElement("option");
          c.text = i.username;
          c.value = i.username;
          x.options.add(c, 1);
          var cc = document.createElement("hr");
          x.appendChild(cc);
        });
      };

      // Send request
      request.send();
    </script>

    <!-- Add Admin -->
    <script>
      function add() {
        var url = "http://127.0.0.1:3000/admins"; // Définir la collection à manipuler
        // Récupère les données saisies dans la variable data.
        var data = {};
        data.username = document.getElementById("username").value; // Récupération de la variable username saisir dans notre code html
        data.email = document.getElementById("email").value; // Récupération de la variable email saisir dans notre code html
        data.password = document.getElementById("password").value; // Récupération de la variable password saisir dans notre code html
        var json = JSON.stringify(data); // Convertir la variable de données en JSON.
        var xhr = new XMLHttpRequest(); // Définir une requête de connection standard JS
        xhr.open("POST", url, true); // Choisir la méthode POST comme une méthode d'accès au serveur et récupérer les données .
        xhr.setRequestHeader("Content-type", "application/json; charset=utf-8"); // Choisir l'encodage utf-8 pour que la resultat retourne peut avoir différents format de text comme les côté , les accent …..
        // Load les données à partir de la serveur -> début connection
        xhr.onload = function () {
          var admins = JSON.parse(xhr.responseText); // Conversion des données en format json
          // Si le status retourné par le serveur est 200
          if (xhr.readyState == 4 && xhr.status == "200") {
            alert("Admin Added");
            location.replace("listAdmin.html");
          } else {
            alert(admins.message);
            console.table(admins);
          }
        };
        xhr.send(json);
      }
    </script>
  </body>
</html>
